<!DOCTYPE html>
{% load static %}
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TechBlog{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <!-- Підключення Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    {% block extra_css %}{% endblock %}

    <!-- Кастомні стилі -->
    <style>
        .navbar-brand {
            font-weight: bold;
            color: #007bff !important;
        }
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 0;
        }
        .card {
            transition: transform 0.2s;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .nav-link {
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #007bff !important;
            transform: scale(1.05);
        }
        .active {
            font-weight: bold;
            color: #007bff !important;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Навігаційна панель -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home_view' %}">🚀 TechBlog</a>
                <div class="navbar-nav ms-auto">

                    <a class="nav-link {% if request.resolver_match.url_name == 'home_view' %}active{% endif %}"
                       href="{% url 'home_view' %}">
                        Головна
                    </a>

                    <a class="nav-link {% if request.resolver_match.url_name == 'popular_posts' %}active{% endif %}"
                       href="{% url 'popular_posts' %}">
                        Популярне
                    </a>

                    <a class="nav-link {% if request.resolver_match.url_name == 'check_experience' %}active{% endif %}"
                       href="{% url 'check_experience' %}">
                        Досвід
                    </a>

                    <a class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}"
                       href="{% url 'about' %}">
                        Про нас
                    </a>

                    <a class="nav-link {% if request.resolver_match.url_name == 'contact' %}active{% endif %}"
                       href="{% url 'contact' %}">
                        Контакти
                    </a>
                </div>
        </div>
    </nav>

    <div class="title">
        <h2>Імя: {{ about_me.name }}</h2>
        <h2>Вік: {{ about_me.age }}</h2>
    </div>

    <!-- Основний контент сторінки -->
    <main>
        {% block content %}
        <!-- Контент буде підставлятися тут із дочірніх шаблонів -->
        {% endblock %}
    </main>


    <!-- Футер -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p>&copy; 2024 TechBlog. Всі права захищені.</p>
        </div>
    </footer>


    <!-- Підключення Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
